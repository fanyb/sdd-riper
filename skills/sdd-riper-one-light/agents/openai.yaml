interface:
  display_name: "SDD RIPER Light"
  short_description: "面向强模型的轻量 SDD/RIPER 编码工作流：压缩常驻协议，只保留 spec、checkpoint、批准三类关键门禁。"
  default_prompt: "用中文按轻量 checkpoint-driven SDD/RIPER 协议处理当前编码任务：先用自己的话复述当前理解，再建立或更新最小 spec 并落盘；默认由模型自行分解任务，但实现前必须给一次短 checkpoint，说明当前理解、核心目标、下一步、风险和验证方式；未获明确批准前不要执行代码修改；执行后回写 spec。"
